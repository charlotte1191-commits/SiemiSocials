<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cream rounded square background -->
  <rect width="32" height="32" rx="7" fill="#F2F0EA"/>

  <!-- Siemi Socials S — traced from actual logo font -->
  <image
    href="data:image/png;base64,"
    x="3" y="1"
    width="22" height="28"
    preserveAspectRatio="xMidYMid meet"
  />

  <!-- Pink sparkle — top right -->
  <g transform="translate(25.5, 6.5)">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#FF76AA" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#FF76AA" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-2" y1="-2" x2="2" y2="2" stroke="#FF76AA" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="2" y1="-2" x2="-2" y2="2" stroke="#FF76AA" stroke-width="0.7" stroke-linecap="round"/>
  </g>
</svg>